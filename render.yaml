services:
  - type: web
    runtime: node
    name: jakeanddanielwebsite
    repo: https://github.com/joeysantana3/jakeanddanielwebsite.git
    branch: main
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
