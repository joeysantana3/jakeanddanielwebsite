<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Cookie Clicker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { color: #f5a623; margin-bottom: 20px; }
    #login-form {
      background: #2a2a4a;
      padding: 20px;
      border-radius: 10px;
      max-width: 350px;
    }
    #login-form input {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #444;
      border-radius: 5px;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      background: #f5a623;
      color: #1a1a2e;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    button.danger { background: #e44d26; color: #fff; }
    button.small { padding: 5px 10px; font-size: 12px; }
    .error { color: #e44d26; margin-bottom: 10px; }
    #admin-panel { display: none; }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .top-bar span { color: #aaa; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th { color: #f5a623; font-size: 13px; text-transform: uppercase; }
    td { font-size: 14px; }
    .badge-admin {
      background: #f5a623;
      color: #1a1a2e;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }
    .actions { display: flex; gap: 5px; flex-wrap: wrap; }
    a { color: #f5a623; }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>

  <div id="login-form">
    <div class="error" id="login-error" style="display:none"></div>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="admin-panel">
    <div class="top-bar">
      <span>Logged in as <strong id="admin-name"></strong></span>
      <div>
        <a href="/">Back to Game</a> |
        <button class="small" onclick="logout()">Logout</button>
      </div>
    </div>

    <h2>Users & Scores</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Role</th>
          <th>Clicker Score</th>
          <th>Total Earned</th>
          <th>Protector Best</th>
          <th>Joined</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-table"></tbody>
    </table>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const adminPanel = document.getElementById("admin-panel");
    const loginError = document.getElementById("login-error");
    const adminName = document.getElementById("admin-name");
    const usersTable = document.getElementById("users-table");

    // Check if already logged in
    fetch("/api/me").then(r => r.json()).then(data => {
      if (data.loggedIn && data.isAdmin) showAdmin(data.username);
    });

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      loginError.style.display = "none";

      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        loginError.textContent = data.error;
        loginError.style.display = "block";
        return;
      }
      if (!data.isAdmin) {
        loginError.textContent = "You are not an admin";
        loginError.style.display = "block";
        return;
      }
      showAdmin(data.username);
    }

    function showAdmin(username) {
      loginForm.style.display = "none";
      adminPanel.style.display = "block";
      adminName.textContent = username;
      loadUsers();
    }

    async function loadUsers() {
      const res = await fetch("/api/admin/users");
      const users = await res.json();
      usersTable.innerHTML = users.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td>${u.is_admin ? '<span class="badge-admin">ADMIN</span>' : 'User'}</td>
          <td>${u.clicker_score ?? 0}</td>
          <td>${u.clicker_total_earned ?? 0}</td>
          <td>${u.protector_best ?? 0}</td>
          <td>${new Date(u.created_at).toLocaleDateString()}</td>
          <td class="actions">
            <button class="small" onclick="toggleAdmin(${u.id})">Toggle Admin</button>
            <button class="small danger" onclick="deleteUser(${u.id}, '${u.username}')">Delete</button>
          </td>
        </tr>
      `).join("");
    }

    async function toggleAdmin(id) {
      const res = await fetch("/api/admin/users/" + id + "/toggle-admin", { method: "PUT" });
      const data = await res.json();
      if (!res.ok) { alert(data.error); return; }
      loadUsers();
    }

    async function deleteUser(id, username) {
      if (!confirm("Delete user " + username + "? This cannot be undone.")) return;
      const res = await fetch("/api/admin/users/" + id, { method: "DELETE" });
      const data = await res.json();
      if (!res.ok) { alert(data.error); return; }
      loadUsers();
    }

    async function logout() {
      await fetch("/api/logout", { method: "POST" });
      location.reload();
    }
  </script>
</body>
</html>
