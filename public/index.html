<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Clicker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
    }

    #score-board {
      margin-top: 40px;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 200, 100, 0.6);
    }

    #score-board span {
      color: #f5a623;
    }

    #game-area {
      position: relative;
      width: 100%;
      flex: 1;
    }

    .cookie {
      position: absolute;
      width: 100px;
      height: 100px;
      font-size: 80px;
      line-height: 100px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.05s;
      filter: drop-shadow(0 0 15px rgba(255, 200, 100, 0.5));
    }

    .cookie:hover {
      transform: scale(1.1);
    }

    .cookie:active {
      transform: scale(0.9);
    }

    .float-text {
      position: absolute;
      font-size: 24px;
      font-weight: bold;
      color: #f5a623;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    #instructions {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="score-board">Cookies: <span id="score">0</span></div>
  <div id="game-area">
  </div>
  <div id="instructions">Click the cookie before it moves!</div>

  <script>
    const scoreEl = document.getElementById("score");
    const gameArea = document.getElementById("game-area");
    let score = 0;
    const cookies = [];

    function createCookie(startX, startY) {
      const el = document.createElement("div");
      el.className = "cookie";
      el.textContent = "\u{1F36A}";
      gameArea.appendChild(el);

      const angle = Math.random() * Math.PI * 2;
      const baseSpeed = 2 + Math.random() * 2;
      const cookie = {
        el,
        x: startX,
        y: startY,
        vx: Math.cos(angle) * baseSpeed,
        vy: Math.sin(angle) * baseSpeed,
      };

      el.addEventListener("click", (e) => {
        e.stopPropagation();
        score++;
        scoreEl.textContent = score;

        // Speed up all cookies slightly every 5 clicks
        if (score % 5 === 0) {
          cookies.forEach(c => {
            c.vx *= 1.1;
            c.vy *= 1.1;
          });
        }

        // Bounce clicked cookie in a random direction
        const a = Math.random() * Math.PI * 2;
        const spd = Math.sqrt(cookie.vx * cookie.vx + cookie.vy * cookie.vy);
        cookie.vx = Math.cos(a) * spd;
        cookie.vy = Math.sin(a) * spd;

        // Float +1 text
        const floater = document.createElement("div");
        floater.className = "float-text";
        floater.textContent = "+1";
        const gaRect = gameArea.getBoundingClientRect();
        floater.style.left = (e.clientX - gaRect.left) + "px";
        floater.style.top = (e.clientY - gaRect.top) + "px";
        gameArea.appendChild(floater);
        setTimeout(() => floater.remove(), 800);

        // Spawn 2 new cookies from the clicked position
        createCookie(cookie.x, cookie.y);
        createCookie(cookie.x, cookie.y);
      });

      cookies.push(cookie);
    }

    function gameLoop() {
      const rect = gameArea.getBoundingClientRect();
      const maxX = rect.width - 100;
      const maxY = rect.height - 100;

      for (const c of cookies) {
        c.x += c.vx;
        c.y += c.vy;

        if (c.x <= 0 || c.x >= maxX) { c.vx *= -1; c.x = Math.max(0, Math.min(c.x, maxX)); }
        if (c.y <= 0 || c.y >= maxY) { c.vy *= -1; c.y = Math.max(0, Math.min(c.y, maxY)); }

        c.el.style.left = c.x + "px";
        c.el.style.top = c.y + "px";
      }

      requestAnimationFrame(gameLoop);
    }

    // Start with one cookie in the center
    const initRect = gameArea.getBoundingClientRect();
    createCookie(initRect.width / 2 - 50, initRect.height / 2 - 50);
    gameLoop();
  </script>
</body>
</html>
